set_min_intensity:
  name: Set minimum intensity
  description: Set the minimum charging intensity (MinIntensity) on the V2C Trydan charger.
  fields:
    min_intensity:
      name: Minimum intensity
      description: Minimum charging current in amperes. Must be an integer between 6 and 32.
      required: true
      example: 6
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: A
          mode: box

set_max_intensity:
  name: Set maximum intensity
  description: Set the maximum charging intensity (MaxIntensity) on the V2C Trydan charger.
  fields:
    max_intensity:
      name: Maximum intensity
      description: Maximum charging current in amperes. Must be an integer between 6 and 32.
      required: true
      example: 32
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: A
          mode: box

set_intensity:
  name: Set intensity
  description: Set the charging intensity (Intensity) on the V2C Trydan charger.
  fields:
    intensity:
      name: Intensity
      description: Charging current in amperes. Must be an integer between 6 and 32.
      required: true
      example: 16
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: A
          mode: box

set_dynamic_power_mode:
  name: Set dynamic power mode
  description: Set the dynamic power mode (DynamicPowerMode) on the V2C Trydan charger.
  fields:
