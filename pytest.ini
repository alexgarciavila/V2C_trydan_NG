[pytest]
# Configuracion de pytest para custom_components/v2c_trydan.
#
# asyncio_mode = auto: requerido por pytest-homeassistant-custom-component;
# permite declarar `async def test_...` sin decorar cada test con
# @pytest.mark.asyncio (el propio plugin ya trae pytest-asyncio como
# dependencia transitiva).
asyncio_mode = auto

testpaths = tests

addopts =
    -v
    --cov=custom_components.v2c_trydan
    --cov-report=term-missing
